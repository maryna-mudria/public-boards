name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3"

      - name: Run unit tests
        run: python3 -m unittest -v tests/test_validate_board.py tests/test_public_tree.py

      - name: Run publisher tests
        run: bash tests/test_publish_board.sh

      - name: Check whitespace
        run: git diff --check
